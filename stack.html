<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stack</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a0f;
            --card: #16161f;
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --text: #ffffff;
            --text-dim: #71717a;
        }

        html, body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            user-select: none;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
        }

        .container {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            max-width: 400px;
            margin: 0 auto;
            overflow: hidden;
        }

        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none !important; }

        /* ===== INTRO ===== */
        .intro-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 32px;
        }

        .intro-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .game-logo {
            font-size: 4rem;
            animation: bounce 1.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .game-tagline {
            font-size: 1rem;
            color: var(--text-dim);
        }

        .game-rules {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .rule {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
        }

        .rule-icon {
            font-size: 1.5rem;
            width: 32px;
            text-align: center;
        }

        .rule-text {
            font-size: 1rem;
            color: var(--text-dim);
            text-align: left;
        }

        .rule-text strong {
            color: var(--text);
        }

        .btn {
            padding: 18px 24px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-play {
            width: 100%;
            background: var(--green);
            color: #000;
        }

        /* ===== GAME ===== */
        .game-screen {
            gap: 12px;
        }

        /* Header */
        .game-header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px 0;
        }

        .week-indicator {
            display: flex;
            gap: 8px;
        }

        .week-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--card);
            transition: all 0.3s;
        }

        .week-dot.done { background: var(--green); }
        .week-dot.current {
            background: #fbbf24;
            box-shadow: 0 0 12px #fbbf24;
        }
        .week-dot.sold { background: var(--red); }

        /* Market Card */
        .market-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .market-card.up {
            background: var(--green-dim);
            border: 2px solid var(--green);
        }

        .market-card.down {
            background: var(--red-dim);
            border: 2px solid var(--red);
        }

        .market-week {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .market-message {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .market-emoji {
            font-size: 2rem;
        }

        .market-emoji.pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .market-text {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .market-card.up .market-text { color: var(--green); }
        .market-card.down .market-text { color: var(--red); }

        .market-waiting {
            font-size: 1.1rem;
            color: var(--text-dim);
        }

        /* Sold Notice */
        .sold-notice {
            background: var(--red);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            display: none;
        }

        .sold-notice.visible { display: block; }

        /* Balance Card */
        .balance-card {
            background: var(--card);
            border-radius: 24px;
            padding: 28px 24px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }

        .balance-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .balance-value {
            font-size: 3.2rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 16px;
        }

        .balance-value.up { color: var(--green); }
        .balance-value.down { color: var(--red); }

        .balance-breakdown {
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .breakdown-item {
            text-align: center;
        }

        .breakdown-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .breakdown-value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .breakdown-value.green { color: var(--green); }
        .breakdown-value.red { color: var(--red); }

        /* Chart */
        .chart-wrap {
            background: var(--card);
            border-radius: 16px;
            padding: 12px;
            height: 100px;
        }

        #chartCanvas {
            width: 100%;
            height: 100%;
        }

        /* Action - Primary CTA */
        .action-area {
            margin-top: auto;
            padding-top: 12px;
        }

        .btn-next {
            width: 100%;
            background: #fbbf24;
            color: #000;
            font-size: 1.2rem;
            padding: 20px;
        }

        .btn-results {
            width: 100%;
            background: #fbbf24;
            color: #000;
            font-size: 1.2rem;
            padding: 20px;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s;
        }

        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card);
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.visible .modal {
            transform: scale(1);
        }

        .modal-emoji {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        .modal-week {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .modal-amount {
            background: var(--bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .modal-amount-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--green);
        }

        .modal-amount-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Side by side buttons */
        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons .btn {
            flex: 1;
            padding: 16px 12px;
            font-size: 1rem;
        }

        .btn-invest {
            background: var(--green);
            color: #000;
        }

        .btn-cashout {
            background: var(--red-dim);
            color: var(--red);
            border: 2px solid var(--red);
        }

        .btn-invest-full {
            width: 100%;
            background: var(--green);
            color: #000;
        }

        /* ===== RESULTS ===== */
        .result-emoji {
            font-size: 4rem;
            margin-bottom: 12px;
        }

        .result-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .result-badge.win {
            background: var(--green);
            color: #000;
        }

        .result-badge.loss {
            background: var(--red);
        }

        .result-value {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .result-value.win { color: var(--green); }
        .result-value.loss { color: var(--red); }

        .result-profit {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .result-profit.win { color: var(--green); }
        .result-profit.loss { color: var(--red); }

        .result-comparison {
            background: var(--bg);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .comparison-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .comparison-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fbbf24;
        }

        .comparison-diff {
            font-size: 0.8rem;
            color: var(--red);
            margin-top: 4px;
        }

        .btn-restart {
            width: 100%;
            background: var(--text);
            color: var(--bg);
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            pointer-events: none;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Float animation */
        .float-up {
            position: absolute;
            font-size: 1.3rem;
            font-weight: 800;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        .float-up.gain { color: var(--green); }
        .float-up.loss { color: var(--red); }

        @keyframes floatUp {
            to {
                opacity: 0;
                transform: translateY(-50px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- INTRO -->
        <div id="introScreen" class="screen intro-screen">
            <div class="intro-header">
                <div class="game-logo">💰</div>
                <h1 class="game-title">STACK</h1>
                <p class="game-tagline">How high can you stack it?</p>
            </div>

            <div class="game-rules">
                <div class="rule">
                    <div class="rule-icon">📈</div>
                    <div class="rule-text"><strong>6 weeks</strong> of market moves</div>
                </div>
                <div class="rule">
                    <div class="rule-icon">💵</div>
                    <div class="rule-text"><strong>$1,000</strong> to invest each week</div>
                </div>
                <div class="rule">
                    <div class="rule-icon">🎯</div>
                    <div class="rule-text">Stack as high as you can</div>
                </div>
            </div>

            <button class="btn btn-play" onclick="startGame()">PLAY</button>
        </div>

        <!-- GAME -->
        <div id="gameScreen" class="screen game-screen hidden">
            <div class="game-header">
                <div class="week-indicator" id="weekIndicator">
                    <div class="week-dot"></div>
                    <div class="week-dot"></div>
                    <div class="week-dot"></div>
                    <div class="week-dot"></div>
                    <div class="week-dot"></div>
                    <div class="week-dot"></div>
                </div>
            </div>

            <div class="sold-notice" id="soldNotice">💸 You cashed out</div>

            <div class="market-card" id="marketCard">
                <div class="market-week" id="marketWeek">Week 1</div>
                <div class="market-message">
                    <div class="market-emoji" id="marketEmoji">🎲</div>
                    <div class="market-waiting" id="marketWaiting">Waiting for market...</div>
                    <div class="market-text" id="marketText" style="display: none;"></div>
                </div>
            </div>

            <div class="balance-card" id="balanceCard">
                <div class="balance-label" id="balanceLabel">Your Balance</div>
                <div class="balance-value" id="balanceValue">$0</div>
                <div class="balance-breakdown">
                    <div class="breakdown-item">
                        <div class="breakdown-label">Invested</div>
                        <div class="breakdown-value" id="investedValue">$0</div>
                    </div>
                    <div class="breakdown-item">
                        <div class="breakdown-label">Profit/Loss</div>
                        <div class="breakdown-value" id="profitValue">$0</div>
                    </div>
                </div>
            </div>

            <div class="chart-wrap">
                <canvas id="chartCanvas"></canvas>
            </div>

            <div class="action-area">
                <button class="btn btn-next" id="actionBtn" onclick="handleAction()">NEXT WEEK →</button>
            </div>
        </div>
    </div>

    <!-- DECISION MODAL -->
    <div class="modal-overlay" id="decisionModal">
        <div class="modal">
            <div class="modal-emoji" id="decisionEmoji">💰</div>
            <div class="modal-week" id="decisionWeekLabel">Week 1</div>
            <h2 class="modal-title" id="decisionTitle">Ready?</h2>

            <div class="modal-amount">
                <div class="modal-amount-value">$1,000</div>
                <div class="modal-amount-label">to invest</div>
            </div>

            <div class="modal-buttons" id="modalButtons">
                <button class="btn btn-invest-full" onclick="makeDecision('buy')">INVEST</button>
            </div>
            <div class="modal-buttons" id="modalButtonsSplit" style="display: none;">
                <button class="btn btn-invest" onclick="makeDecision('buy')">INVEST</button>
                <button class="btn btn-cashout" onclick="makeDecision('sell')">CASH OUT</button>
            </div>
        </div>
    </div>

    <!-- RESULT MODAL -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal">
            <div class="result-emoji" id="resultEmoji">🏆</div>
            <div class="result-badge" id="resultBadge">WINNER</div>
            <div class="result-value" id="resultValue">$0</div>
            <div class="result-profit" id="resultProfit">+$0</div>

            <div class="result-comparison" id="resultComparison">
                <div class="comparison-label">If you stayed all 6 weeks</div>
                <div class="comparison-value" id="comparisonValue">$0</div>
                <div class="comparison-diff" id="comparisonDiff"></div>
            </div>

            <button class="btn btn-restart" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Prevent pull-to-refresh
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.closest('.chart-wrap')) return;
            e.preventDefault();
        }, { passive: false });

        const WEEKS = 6;
        const INVEST = 1000;

        const SCENARIOS = [
            [-8, -15, 12, 8, 10, 18],
            [5, -18, -10, 22, 10, 12],
            [-12, 6, -14, 16, 12, 14],
            [6, 4, -22, 14, 12, 10],
            [-6, -14, 10, -4, 18, 20],
            [-18, 8, 6, -6, 14, 22]
        ];

        let state = {};
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');

        function startGame() {
            document.getElementById('introScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');

            const moves = SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
            const prices = [100];
            let p = 100;
            for (const m of moves) { p *= (1 + m/100); prices.push(p); }

            state = {
                week: 0,
                price: 100,
                history: [100],
                allPrices: prices,
                shares: 0,
                invested: 0,
                soldValue: 0,
                sold: false,
                soldWeek: -1,
                dcaShares: 0,
                dcaInvested: 0,
                moves: moves,
                done: false
            };

            document.getElementById('soldNotice').classList.remove('visible');
            document.getElementById('marketCard').className = 'market-card';
            document.getElementById('marketEmoji').textContent = '🎲';
            document.getElementById('marketWaiting').style.display = 'block';
            document.getElementById('marketText').style.display = 'none';
            document.getElementById('marketWeek').textContent = 'Week 1';

            updateDots();
            updateBalance(0, false);

            setTimeout(() => {
                resizeCanvas();
                showDecision();
            }, 100);
        }

        function updateDots() {
            const dots = document.querySelectorAll('.week-dot');
            dots.forEach((d, i) => {
                d.className = 'week-dot';
                if (i < state.week) d.classList.add(state.sold && i >= state.soldWeek ? 'sold' : 'done');
                else if (i === state.week && state.week < WEEKS) d.classList.add('current');
            });
        }

        function getMarketMessage(pct) {
            if (pct >= 10) return { emoji: '🚀', text: `Market up ${pct}%` };
            if (pct > 0) return { emoji: '📈', text: `Market up ${pct}%` };
            if (pct > -10) return { emoji: '📉', text: `Market down ${Math.abs(pct)}%` };
            return { emoji: '💀', text: `Market down ${Math.abs(pct)}%` };
        }

        function showDecision() {
            const w = state.week + 1;
            document.getElementById('decisionWeekLabel').textContent = `Week ${w}`;

            if (state.week === 0) {
                document.getElementById('decisionEmoji').textContent = '💰';
                document.getElementById('decisionTitle').textContent = 'Ready to start?';
                document.getElementById('modalButtons').style.display = 'flex';
                document.getElementById('modalButtonsSplit').style.display = 'none';
            } else {
                const last = state.moves[state.week - 1];
                if (last < -10) {
                    document.getElementById('decisionEmoji').textContent = '😰';
                    document.getElementById('decisionTitle').textContent = 'Ouch! Keep going?';
                } else if (last < 0) {
                    document.getElementById('decisionEmoji').textContent = '🤔';
                    document.getElementById('decisionTitle').textContent = 'Small dip. Stay in?';
                } else if (last > 10) {
                    document.getElementById('decisionEmoji').textContent = '🔥';
                    document.getElementById('decisionTitle').textContent = 'Hot streak! More?';
                } else {
                    document.getElementById('decisionEmoji').textContent = '💪';
                    document.getElementById('decisionTitle').textContent = 'Keep going?';
                }
                document.getElementById('modalButtons').style.display = 'none';
                document.getElementById('modalButtonsSplit').style.display = 'flex';
            }

            document.getElementById('decisionModal').classList.add('visible');
        }

        function makeDecision(choice) {
            document.getElementById('decisionModal').classList.remove('visible');

            state.week++;
            const move = state.moves[state.week - 1];
            state.price = state.allPrices[state.week];
            state.history.push(state.price);

            // Update market card with clear message
            const card = document.getElementById('marketCard');
            const emoji = document.getElementById('marketEmoji');
            const msg = getMarketMessage(move);

            card.className = 'market-card ' + (move >= 0 ? 'up' : 'down');
            document.getElementById('marketWeek').textContent = `Week ${state.week}`;

            emoji.textContent = msg.emoji;
            emoji.classList.remove('pop');
            void emoji.offsetWidth;
            emoji.classList.add('pop');

            document.getElementById('marketWaiting').style.display = 'none';
            const textEl = document.getElementById('marketText');
            textEl.style.display = 'block';
            textEl.textContent = msg.text;

            const oldVal = state.sold ? state.soldValue : state.shares * state.allPrices[state.week - 1];

            if (choice === 'buy') {
                state.shares += INVEST / state.price;
                state.invested += INVEST;
            } else {
                state.soldValue = state.shares * state.price;
                state.sold = true;
                state.soldWeek = state.week;
                document.getElementById('soldNotice').classList.add('visible');
            }

            state.dcaShares += INVEST / state.price;
            state.dcaInvested += INVEST;

            const newVal = state.sold ? state.soldValue : state.shares * state.price;

            updateDots();
            updateBalance(newVal, true, newVal - oldVal);
            drawChart();

            const btn = document.getElementById('actionBtn');
            if (state.week >= WEEKS) {
                state.done = true;
                btn.textContent = 'SEE RESULTS 🏆';
                btn.className = 'btn btn-results';
            } else {
                btn.textContent = 'NEXT WEEK →';
                btn.className = 'btn btn-next';
            }
        }

        function handleAction() {
            if (state.done) { showResults(); return; }

            if (state.sold) {
                state.week++;
                const move = state.moves[state.week - 1];
                state.price = state.allPrices[state.week];
                state.history.push(state.price);

                const card = document.getElementById('marketCard');
                const emoji = document.getElementById('marketEmoji');
                const msg = getMarketMessage(move);

                card.className = 'market-card ' + (move >= 0 ? 'up' : 'down');
                document.getElementById('marketWeek').textContent = `Week ${state.week}`;

                emoji.textContent = msg.emoji;
                emoji.classList.remove('pop');
                void emoji.offsetWidth;
                emoji.classList.add('pop');

                document.getElementById('marketText').textContent = msg.text;

                state.dcaShares += INVEST / state.price;
                state.dcaInvested += INVEST;

                updateDots();
                updateBalance(state.soldValue, true, 0);
                drawChart();

                if (state.week >= WEEKS) {
                    state.done = true;
                    const btn = document.getElementById('actionBtn');
                    btn.textContent = 'SEE RESULTS 🏆';
                    btn.className = 'btn btn-results';
                }
            } else {
                showDecision();
            }
        }

        function updateBalance(value, animate, diff) {
            const el = document.getElementById('balanceValue');

            if (animate) {
                animateNum(el, value);
                if (diff && diff !== 0) showFloat(diff);
            } else {
                el.textContent = fmt(value);
            }

            if (state.sold) {
                document.getElementById('balanceLabel').textContent = 'Cashed Out';
                el.className = 'balance-value down';
            } else if (value > state.invested) {
                document.getElementById('balanceLabel').textContent = 'Your Balance';
                el.className = 'balance-value up';
            } else if (value < state.invested) {
                document.getElementById('balanceLabel').textContent = 'Your Balance';
                el.className = 'balance-value down';
            } else {
                document.getElementById('balanceLabel').textContent = 'Your Balance';
                el.className = 'balance-value';
            }

            document.getElementById('investedValue').textContent = fmt(state.invested);

            const profit = value - state.invested;
            const profitEl = document.getElementById('profitValue');
            profitEl.textContent = (profit >= 0 ? '+' : '') + fmt(profit);
            profitEl.className = 'breakdown-value ' + (profit > 0 ? 'green' : profit < 0 ? 'red' : '');
        }

        function animateNum(el, target) {
            const start = performance.now();
            const startVal = parseInt(el.textContent.replace(/[$,\-]/g, '')) || 0;

            function tick(now) {
                const p = Math.min((now - start) / 500, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                el.textContent = fmt(startVal + (target - startVal) * ease);
                if (p < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        function showFloat(diff) {
            const card = document.getElementById('balanceCard');
            const f = document.createElement('div');
            f.className = 'float-up ' + (diff > 0 ? 'gain' : 'loss');
            f.textContent = (diff > 0 ? '+' : '') + fmt(diff);
            f.style.cssText = 'left:50%;top:35%;transform:translateX(-50%)';
            card.style.position = 'relative';
            card.appendChild(f);
            setTimeout(() => f.remove(), 800);
        }

        function resizeCanvas() {
            const wrap = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = wrap.offsetWidth * dpr;
            canvas.height = wrap.offsetHeight * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = wrap.offsetWidth + 'px';
            canvas.style.height = wrap.offsetHeight + 'px';
            if (state.history && state.history.length > 1) drawChart();
        }

        window.addEventListener('resize', resizeCanvas);

        function drawChart() {
            const w = canvas.parentElement.offsetWidth;
            const h = canvas.parentElement.offsetHeight;
            if (!w || !h) return;
            ctx.clearRect(0, 0, w, h);

            const prices = state.history;
            if (prices.length < 2) return;

            const all = state.allPrices;
            const min = Math.min(...all), max = Math.max(...all);
            const range = max - min;
            const padMin = min - range * 0.2, padMax = max + range * 0.2;
            const disp = padMax - padMin;

            const pad = { t: 8, r: 8, b: 12, l: 8 };
            const gw = w - pad.l - pad.r, gh = h - pad.t - pad.b;
            const getY = p => pad.t + gh - ((p - padMin) / disp) * gh;
            const getX = i => pad.l + (i / WEEKS) * gw;

            const color = state.sold ? '#ef4444' : '#22c55e';

            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            prices.forEach((p, i) => i === 0 ? ctx.moveTo(getX(i), getY(p)) : ctx.lineTo(getX(i), getY(p)));
            ctx.stroke();

            ctx.beginPath();
            prices.forEach((p, i) => i === 0 ? ctx.moveTo(getX(i), getY(p)) : ctx.lineTo(getX(i), getY(p)));
            ctx.lineTo(getX(prices.length - 1), h - pad.b);
            ctx.lineTo(pad.l, h - pad.b);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad.t, 0, h - pad.b);
            grad.addColorStop(0, state.sold ? 'rgba(239,68,68,0.2)' : 'rgba(34,197,94,0.2)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fill();

            prices.forEach((p, i) => {
                const last = i === prices.length - 1;
                ctx.beginPath();
                ctx.arc(getX(i), getY(p), last ? 5 : 2.5, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            });
        }

        function showResults() {
            const final = state.sold ? state.soldValue : state.shares * state.price;
            const dca = state.dcaShares * state.price;
            const profit = final - state.invested;
            const missed = dca - final;

            document.getElementById('resultValue').textContent = fmt(final);
            document.getElementById('comparisonValue').textContent = fmt(dca);

            if (state.sold) {
                document.getElementById('resultEmoji').textContent = '😬';
                document.getElementById('resultBadge').textContent = 'CASHED OUT';
                document.getElementById('resultBadge').className = 'result-badge loss';
                document.getElementById('resultValue').className = 'result-value loss';
                document.getElementById('resultProfit').textContent = fmt(profit);
                document.getElementById('resultProfit').className = 'result-profit ' + (profit >= 0 ? 'win' : 'loss');
                document.getElementById('comparisonDiff').textContent = 'You missed ' + fmt(missed);
                document.getElementById('resultComparison').style.display = 'block';
            } else {
                document.getElementById('resultEmoji').textContent = profit >= 0 ? '🏆' : '💪';
                document.getElementById('resultBadge').textContent = profit >= 0 ? 'WINNER' : 'HELD STRONG';
                document.getElementById('resultBadge').className = 'result-badge win';
                document.getElementById('resultValue').className = 'result-value ' + (profit >= 0 ? 'win' : 'loss');
                document.getElementById('resultProfit').textContent = (profit >= 0 ? '+' : '') + fmt(profit);
                document.getElementById('resultProfit').className = 'result-profit ' + (profit >= 0 ? 'win' : 'loss');
                document.getElementById('resultComparison').style.display = 'none';
                if (profit >= 0) confetti();
            }

            document.getElementById('resultModal').classList.add('visible');
        }

        function confetti() {
            const colors = ['#22c55e', '#fbbf24', '#8b5cf6', '#ec4899', '#3b82f6'];
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-piece';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-10px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDelay = Math.random() * 0.3 + 's';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 3000);
            }
        }

        function restartGame() {
            document.getElementById('resultModal').classList.remove('visible');
            startGame();
        }

        function fmt(n) {
            const r = Math.round(n);
            return r < 0 ? '-$' + Math.abs(r).toLocaleString() : '$' + r.toLocaleString();
        }
    </script>
</body>
